name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── .NET 10 + Aspire ────────────────────────────────────────────────
      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install .NET Aspire workload
        run: dotnet workload install aspire

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('back/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET solution
        run: dotnet restore back/MTGArchitect.slnx

      # ── Node.js 22 + Angular 21 ─────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install npm dependencies
        working-directory: front
        run: npm ci

      # ── Claude Code ──────────────────────────────────────────────────────
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read
            mcp__playwright: read

          allowed_tools: >-
            Bash(npm run *),
            Bash(npm test *),
            Bash(dotnet build *),
            Bash(dotnet test *),
            Bash(dotnet restore *),
            Bash(git *),
            Bash(gh *),
            mcp__playwright__browser_navigate,
            mcp__playwright__browser_snapshot,
            mcp__playwright__browser_screenshot,
            mcp__playwright__browser_click,
            mcp__playwright__browser_type,
            mcp__playwright__browser_hover,
            mcp__playwright__browser_scroll,
            mcp__playwright__browser_select_option,
            mcp__playwright__browser_wait_for,
            mcp__playwright__browser_evaluate,
            mcp__playwright__browser_console_messages,
            mcp__playwright__browser_network_requests,
            mcp__playwright__browser_tab_new,
            mcp__playwright__browser_tab_list,
            mcp__playwright__browser_close

          custom_instructions: |
            The project is already set up with all dependencies installed.
            The server is already running at localhost:4200. If needed, use the mcp__playwright
            set of tools to launch a browser and interact with the app.

