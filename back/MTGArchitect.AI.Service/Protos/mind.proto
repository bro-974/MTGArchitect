syntax = "proto3";

option csharp_namespace = "MTGArchitect.AI.Service";

package mind;

service MindService {
  rpc Chat(ChatRequest) returns (stream ChatResponseStream);
}

message ChatTurn {
  string user_prompt = 1;
  string answer = 2;
}

message DeckCard {
  string scryfall_id = 1;
  string name = 2;
  int32 quantity = 3;
  bool is_side_board = 4;
}

message ChatRequest {
  string prompt = 1;
  repeated ChatTurn history = 2;
  string format = 3;
  repeated DeckCard deck_cards = 4;
}

message ChatResponseStream {
  oneof payload {
    string reasoning_chunk = 1;
    string answer_chunk = 2;
    SuggestedActions final_data = 3;
  }
}

message SuggestedActions {}
