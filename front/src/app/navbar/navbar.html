<header class="p-3 mb-4 surface-card shadow-2">
  <div class="flex justify-content-between align-items-center w-full">

    <!-- Brand -->
    <div class="flex align-items-center gap-2">
      <div class="gem bg-primary w-1rem h-1rem flex-shrink-0"></div>
      <span class="font-bold text-sm white-space-nowrap">
        MTG ARCHITECT
      </span>
    </div>

    <!-- Navigation -->
    <div class="flex align-items-center gap-2">
      <p-button
        severity="secondary"
        type="button"
        icon="pi pi-briefcase"
        class="p-button-rounded p-button-text"
        (click)="goWorkspace()"
        [title]="'navbar.workspace' | transloco"
        [ariaLabel]="'navbar.workspace' | transloco">
      </p-button>

      <p-button
        severity="secondary"
        type="button"
        icon="pi pi-home"
        class="p-button-rounded p-button-text"
        (click)="goHome()"
        [title]="'navbar.home' | transloco"
        [ariaLabel]="'navbar.home' | transloco">
      </p-button>

      <p-button
        severity="secondary"
        type="button"
        icon="pi pi-images"
        class="p-button-rounded p-button-text"
        (click)="goCardExplorer()"
        [title]="'navbar.cardExplorer' | transloco"
        [ariaLabel]="'navbar.cardExplorer' | transloco">
      </p-button>

      <p-button
        severity="secondary"
        type="button"
        icon="pi pi-filter"
        class="p-button-rounded p-button-text"
        (click)="goCardExplorerAdvanced()"
        [title]="'navbar.cardExplorerAdvanced' | transloco"
        [ariaLabel]="'navbar.cardExplorerAdvanced' | transloco">
      </p-button>

      <p-button
        severity="secondary"
        type="button"
        icon="pi pi-server"
        class="p-button-rounded p-button-text"
        (click)="goServerStatus()"
        [title]="'navbar.serverStatus' | transloco"
        [ariaLabel]="'navbar.serverStatus' | transloco">
      </p-button>
    </div>

    <!-- Actions -->
    <div class="flex align-items-center gap-2">
      <p-select
        class="w-10rem"
        [options]="i18nService.languageOptions()"
        [formControl]="languageControl"
        optionValue="value"
        [placeholder]="'navbar.language' | transloco"
        [ariaLabel]="'navbar.language' | transloco">

        <ng-template #selectedItem let-selectedOption>
          @if (selectedOption) {
            {{ selectedOption.labelKey | transloco }}
          }
        </ng-template>

        <ng-template #item let-option>
          {{ option.labelKey | transloco }}
        </ng-template>
      </p-select>

      <p-button
        severity="secondary"
        type="button"
        [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        class="p-button-rounded p-button-text"
        (click)="toggleTheme()"
        [title]="(isDarkMode() ? 'navbar.lightMode' : 'navbar.darkMode') | transloco"
        [ariaLabel]="(isDarkMode() ? 'navbar.lightMode' : 'navbar.darkMode') | transloco">
      </p-button>

      @if (authService.user(); as currentUser) {
        <div class="flex align-items-center gap-1">
          <span class="text-sm font-semibold white-space-nowrap">{{ currentUser.email }}</span>
          <p-button
            severity="secondary"
            type="button"
            icon="pi pi-sign-out"
            class="p-button-rounded p-button-text"
            (click)="logout()"
            [title]="'navbar.logout' | transloco"
            [ariaLabel]="'navbar.logout' | transloco">
          </p-button>
        </div>
      } @else {
        <p-button
          severity="secondary"
          type="button"
          icon="pi pi-sign-in"
          class="p-button-rounded p-button-text"
          (click)="goLogin()"
          [label]="'navbar.login' | transloco"
          [title]="'navbar.login' | transloco"
          [ariaLabel]="'navbar.login' | transloco">
        </p-button>
      }
    </div>

  </div>
</header>
