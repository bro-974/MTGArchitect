<section class="flex flex-column gap-4 pb-6 pt-3">
  <header class="pt-4 pb-2">
    <p class="mb-2 text-xs font-bold uppercase text-primary">{{ 'cardExplorer.eyebrow' | transloco }}</p>
    <h1 class="m-0">{{ 'cardExplorer.title' | transloco }}</h1>
    <p class="mt-3 mb-0 text-color-secondary line-height-3">{{ 'cardExplorer.intro' | transloco }}</p>
  </header>

  <app-card-explorer-search
    [loading]="state() === 'loading'"
    (search)="handleSearch($event)"
  />

  <app-card-explorer-list
    [cards]="cards()"
    [query]="query()"
    [loading]="state() === 'loading'"
    [error]="state() === 'error'"
  />
</section>
