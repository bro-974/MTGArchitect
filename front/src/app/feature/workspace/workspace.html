<p-accordion [value]="activeAccordionPanel()" (valueChange)="setAccordionPanel($event)">
  <p-accordion-panel value="decks">
    <p-accordion-header>{{ 'workspace.accordion.deckList' | transloco }}</p-accordion-header>
    <p-accordion-content>
      <app-workspace-deck-list
        [selectedDeckId]="selectedDeckId()"
        (selectDeck)="handleDeckSelection($event)"
        (createDeck)="handleRequestCreateDeck()"
      />
    </p-accordion-content>
  </p-accordion-panel>

  <p-accordion-panel [disabled]="isSearchDisabled()" value="search">
    <p-accordion-header
      [pTooltip]="isSearchDisabled() ? ('workspace.accordion.advancedSearch.disabledTooltip' | transloco) : ''"
      tooltipPosition="top">
      {{ 'workspace.accordion.advancedSearch.label' | transloco }}
    </p-accordion-header>
    <p-accordion-content>
      <app-workspace-search-form
        [saving]="isSavingSearch()"
        [deckFormat]="selectedDeck()?.type ?? null"
        [deckColorIdentity]="selectedDeck()?.colorIdentity ?? null"
        (saveQuery)="handleSaveQuery($event)"
      />
    </p-accordion-content>
  </p-accordion-panel>

  <p-accordion-panel [disabled]="isChatDisabled()" value="chat">
    <p-accordion-header
      [pTooltip]="isChatDisabled() ? ('workspace.accordion.chatSessions.disabledTooltip' | transloco) : ''"
      tooltipPosition="top">
      {{ 'workspace.accordion.chatSessions.label' | transloco }}
    </p-accordion-header>
    <p-accordion-content>
      <app-ai-chat-session-list />
    </p-accordion-content>
  </p-accordion-panel>
</p-accordion>
